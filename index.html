<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Светлана Орлова — винный автор</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; }


  /* theme toggle (tweaks) */
  .tweaks {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 1000;
    display: none;
    padding: 10px 14px;
    background: rgba(20, 18, 16, 0.9);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #eae4d8;
    gap: 10px;
    align-items: center;
  }
  .tweaks.on { display: flex; }
  .tweaks-title { opacity: 0.55; margin-right: 4px; }
  .tweaks-toggle {
    display: flex;
    background: rgba(255,255,255,0.06);
    border-radius: 999px;
    padding: 3px;
  }
  .tweaks-toggle button {
    background: transparent;
    border: 0;
    color: inherit;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 10px;
  }
  .tweaks-toggle button.on {
    background: #eae4d8;
    color: #141210;
  }


  /* scroll reveal */
  .rv { opacity: 0; transform: translateY(24px); transition: opacity 0.9s cubic-bezier(.2,.6,.2,1), transform 0.9s cubic-bezier(.2,.6,.2,1); }
  .rv.in { opacity: 1; transform: none; }
  .rv.d1 { transition-delay: 0.08s; }
  .rv.d2 { transition-delay: 0.16s; }
  .rv.d3 { transition-delay: 0.24s; }
  .rv.d4 { transition-delay: 0.32s; }
</style>
<style>
/* =======================================================
   V3 — TECH-SOMM
   Space Grotesk (display + body) + JetBrains Mono
   Минимал: off-white / графит / кирпичный акцент
   ======================================================= */

body[data-variant="v3"] {
  background: var(--v3-bg);
  color: var(--v3-ink);
  position: relative;
}
body[data-variant="v3"]::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 85% 12%, color-mix(in oklab, var(--v3-accent) 18%, transparent) 0%, transparent 60%),
    radial-gradient(ellipse 45% 35% at 8% 78%, color-mix(in oklab, var(--v3-accent) 12%, transparent) 0%, transparent 65%),
    radial-gradient(ellipse 30% 25% at 92% 88%, color-mix(in oklab, var(--v3-accent-2) 10%, transparent) 0%, transparent 60%);
}
body[data-variant="v3"] > * { position: relative; z-index: 1; }
.v3 {
  /* light (default) */
  --v3-bg: #f2f1ee;
  --v3-panel: #e9e7e1;
  --v3-card: #fcfbf8;
  --v3-ink: #15140f;
  --v3-ink-soft: #4a4740;
  --v3-ink-mute: #94908a;
  --v3-rule: #d4d1c8;
  --v3-accent: #b8432d; /* brick */
  --v3-accent-2: #2a241a;

  font-family: 'Space Grotesk', sans-serif;
  color: var(--v3-ink);
  background: var(--v3-bg);
  line-height: 1.5;
}
body[data-variant="v3"][data-theme="dark"] .v3 {
  --v3-bg: #0f0e0b;
  --v3-panel: #161410;
  --v3-card: #1a1813;
  --v3-ink: #f1efe8;
  --v3-ink-soft: #b0aca2;
  --v3-ink-mute: #6a6760;
  --v3-rule: #28251e;
  --v3-accent: #e57358;
  --v3-accent-2: #f1efe8;
}
body[data-variant="v3"][data-theme="dark"] { background: var(--v3-bg); color: var(--v3-ink); }

/* top */
.v3-top {
  display: grid;
  grid-template-columns: auto auto 1fr auto;
  align-items: center;
  gap: 24px;
  padding: 20px 40px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--v3-ink-soft);
}
.v3-idx { color: var(--v3-ink-mute); }
.v3-brand {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.01em;
  color: var(--v3-ink);
  text-transform: none;
}
.v3-nav {
  display: flex;
  gap: 20px;
  justify-self: end;
  margin-right: 16px;
}
.v3-nav a { transition: color 0.25s; }
.v3-nav a:hover { color: var(--v3-accent); }
.v3-status {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  border: 1px solid var(--v3-rule);
  border-radius: 999px;
  font-size: 11px;
  letter-spacing: 0.02em;
  text-transform: none;
}
.v3-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #2aa66a;
  box-shadow: 0 0 0 3px rgba(42,166,106,0.18);
  animation: v3pulse 2s ease-in-out infinite;
}
@keyframes v3pulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(42,166,106,0.18); }
  50% { box-shadow: 0 0 0 7px rgba(42,166,106,0.04); }
}

/* hero */
.v3-hero {
  padding: 48px 40px 72px;
}
.v3-hero-grid {
  display: grid;
  grid-template-columns: 1.3fr 1fr;
  gap: 56px;
  align-items: end;
  margin-top: 24px;
}
.v3-hero-l { padding-bottom: 12px; }
.v3-kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.04em;
  color: var(--v3-accent);
  margin-bottom: 32px;
}
.v3-display {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 500;
  font-size: clamp(52px, 7.5vw, 120px);
  line-height: 0.95;
  letter-spacing: -0.045em;
  margin: 0 0 36px;
  color: var(--v3-ink);
  text-wrap: balance;
}
.v3-lede {
  font-size: clamp(17px, 1.3vw, 20px);
  line-height: 1.5;
  color: var(--v3-ink-soft);
  margin: 0 0 36px;
  max-width: 540px;
}

.v3-cta-row { display: flex; gap: 10px; flex-wrap: wrap; }
.v3-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.3s;
}
.v3-btn.primary {
  background: var(--v3-ink);
  color: var(--v3-bg);
}
.v3-btn.primary:hover { background: var(--v3-accent); }
.v3-btn.primary:hover .v3-btn-ar { transform: translateX(4px); }
.v3-btn-ar { transition: transform 0.3s; }
.v3-btn.ghost {
  border: 1px solid var(--v3-rule);
  color: var(--v3-ink);
}
.v3-btn.ghost:hover { border-color: var(--v3-ink); background: var(--v3-panel); }

.v3-hero-r { position: relative; }
.v3-portrait {
  margin: 0;
  aspect-ratio: 4/5;
  overflow: hidden;
  border-radius: 6px;
  position: relative;
  background: var(--v3-panel);
}
.v3-portrait img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 1.4s cubic-bezier(.2,.6,.2,1);
}
.v3-portrait:hover img { transform: scale(1.02); }
.v3-portrait-tag {
  position: absolute;
  left: 12px; bottom: 12px;
  padding: 8px 12px;
  background: rgba(15,14,11,0.78);
  backdrop-filter: blur(8px);
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #f1efe8;
  display: flex;
  gap: 10px;
}
.v3-portrait-tag span:first-child { color: var(--v3-accent); }

/* stats strip */
.v3-stats {
  margin-top: 80px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--v3-rule);
  border: 1px solid var(--v3-rule);
  border-radius: 8px;
  overflow: hidden;
}
.v3-stat {
  background: var(--v3-bg);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: background 0.3s;
}
.v3-stat:hover { background: var(--v3-panel); }
.v3-stat-n {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 500;
  font-size: 44px;
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--v3-ink);
}
.v3-stat-l {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--v3-ink-soft);
  line-height: 1.4;
}

/* sections */
.v3-section {
  padding: 120px 40px;
  border-top: 1px solid var(--v3-rule);
}
.v3-sec-head { margin-bottom: 56px; }
.v3-sec-idx {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.04em;
  color: var(--v3-accent);
  margin-bottom: 20px;
}
.v3-h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 500;
  font-size: clamp(34px, 4.4vw, 68px);
  line-height: 1;
  letter-spacing: -0.035em;
  margin: 0;
  color: var(--v3-ink);
  max-width: 18ch;
  text-wrap: balance;
}
.v3-h2.big { font-size: clamp(44px, 7vw, 120px); max-width: 16ch; }

/* about */
.v3-about-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 64px;
  align-items: start;
}
.v3-about-body {
  font-size: 18px;
  line-height: 1.65;
  color: var(--v3-ink);
}
.v3-about-body p { margin: 0 0 18px; }
.v3-creds {
  padding: 28px;
  background: var(--v3-card);
  border: 1px solid var(--v3-rule);
  border-radius: 12px;
}
.v3-creds-head {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--v3-ink-mute);
  margin-bottom: 24px;
}
.v3-cred {
  padding: 16px 0;
  border-top: 1px solid var(--v3-rule);
  display: grid;
  grid-template-columns: 32px 1fr;
  grid-template-rows: auto auto;
  gap: 4px 12px;
}
.v3-cred:first-of-type { border-top: 0; padding-top: 0; }
.v3-cred-n {
  grid-row: 1 / span 2;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--v3-accent);
  padding-top: 3px;
}
.v3-cred-t {
  font-weight: 500;
  font-size: 16px;
  color: var(--v3-ink);
}
.v3-cred-s {
  font-size: 13px;
  color: var(--v3-ink-soft);
}

/* services grid */
.v3-svc-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.v3-svc {
  padding: 32px 28px;
  background: var(--v3-card);
  border: 1px solid var(--v3-rule);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-height: 340px;
  transition: transform 0.35s, border-color 0.3s, box-shadow 0.35s;
  position: relative;
}
.v3-svc:hover {
  transform: translateY(-4px);
  border-color: var(--v3-accent);
  box-shadow: 0 20px 40px -24px rgba(21,20,15,0.18);
}
.v3-svc-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
}
.v3-svc-num { color: var(--v3-ink-mute); }
.v3-svc-tag {
  color: var(--v3-accent);
  text-transform: uppercase;
}
.v3-svc-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 500;
  font-size: 24px;
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin: 0;
  color: var(--v3-ink);
}
.v3-svc-body {
  font-size: 15px;
  line-height: 1.55;
  color: var(--v3-ink-soft);
  margin: 0;
}
.v3-svc-formats {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--v3-rule);
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.v3-svc-formats span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 5px 10px;
  background: var(--v3-panel);
  border-radius: 6px;
  color: var(--v3-ink-soft);
  letter-spacing: 0.02em;
}

/* pubs — table-like */
.v3-pub-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.v3-pub-head {
  display: grid;
  grid-template-columns: 140px 1fr 200px 40px;
  gap: 20px;
  padding: 0 0 14px;
  border-bottom: 1px solid var(--v3-rule);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--v3-ink-mute);
}
.v3-pub {
  display: grid;
  grid-template-columns: 140px 1fr 200px 40px;
  gap: 20px;
  align-items: center;
  padding: 22px 0;
  border-bottom: 1px solid var(--v3-rule);
  transition: padding 0.35s, background 0.35s;
}
.v3-pub:hover {
  padding-left: 16px;
  padding-right: 16px;
  background: var(--v3-card);
}
.v3-pub:hover .v3-pub-ar { transform: translate(4px, -4px); color: var(--v3-accent); }
.v3-pub-year {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--v3-ink-mute);
}
.v3-pub-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--v3-accent);
}
.v3-pub-title {
  font-weight: 500;
  font-size: 19px;
  line-height: 1.25;
  letter-spacing: -0.015em;
  color: var(--v3-ink);
}
.v3-pub-outlet {
  font-size: 14px;
  color: var(--v3-ink-soft);
}
.v3-pub-ar {
  justify-self: end;
  font-size: 18px;
  color: var(--v3-ink-mute);
  transition: transform 0.35s, color 0.35s;
}

/* samples grid */
.v3-sample-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.v3-sample {
  padding: 24px 22px;
  background: var(--v3-card);
  border: 1px solid var(--v3-rule);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  min-height: 160px;
  transition: transform 0.35s, border-color 0.3s, background 0.3s;
}
.v3-sample:hover {
  transform: translateY(-3px);
  border-color: var(--v3-ink);
}
.v3-sample-top {
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--v3-accent);
}
.v3-sample-top span:last-child { color: var(--v3-ink-mute); transition: transform 0.3s, color 0.3s; }
.v3-sample:hover .v3-sample-top span:last-child { transform: translate(4px, -4px); color: var(--v3-accent); }
.v3-sample-title {
  font-weight: 500;
  font-size: 17px;
  line-height: 1.3;
  letter-spacing: -0.01em;
  color: var(--v3-ink);
}

/* experience */
.v3-tl { list-style: none; padding: 0; margin: 0; }
.v3-tl-item {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 48px;
  padding: 32px 0;
  border-top: 1px solid var(--v3-rule);
  align-items: start;
}
.v3-tl:last-child { border-bottom: 1px solid var(--v3-rule); }
.v3-tl-years {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--v3-accent);
  padding-top: 4px;
}
.v3-tl-c h3 {
  font-weight: 500;
  font-size: 22px;
  letter-spacing: -0.015em;
  margin: 0 0 4px;
  color: var(--v3-ink);
}
.v3-tl-city {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--v3-ink-mute);
}
.v3-tl-role {
  font-size: 14px;
  color: var(--v3-ink-soft);
  margin-bottom: 10px;
}
.v3-tl-c p {
  font-size: 15px;
  line-height: 1.6;
  color: var(--v3-ink-soft);
  margin: 0;
  max-width: 680px;
}

/* contact */
.v3-contact { padding: 120px 40px 48px; }
.v3-contact-body {
  font-size: 20px;
  line-height: 1.5;
  color: var(--v3-ink-soft);
  max-width: 600px;
  margin: 32px 0 48px;
}
.v3-contact-grid {
  display: grid;
  grid-template-columns: 1.5fr 2fr 1.2fr 1fr;
  gap: 12px;
}
.v3-clink {
  padding: 24px 22px;
  background: var(--v3-card);
  border: 1px solid var(--v3-rule);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.v3-clink:hover { transform: translateY(-4px); border-color: var(--v3-accent); }
.v3-clink.primary { background: var(--v3-ink); color: var(--v3-bg); border-color: var(--v3-ink); }
.v3-clink.primary:hover { background: var(--v3-accent); border-color: var(--v3-accent); color: #fff; }
.v3-clink-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  opacity: 0.7;
}
.v3-clink-value {
  font-weight: 500;
  font-size: 18px;
  letter-spacing: -0.01em;
  word-break: break-all;
  overflow-wrap: anywhere;
}
.v3-clink-ar {
  position: absolute;
  top: 18px; right: 18px;
  font-size: 16px;
  transition: transform 0.3s;
}
.v3-clink:hover .v3-clink-ar { transform: translate(4px, -4px); }

.v3-footer {
  margin-top: 80px;
  padding-top: 20px;
  border-top: 1px solid var(--v3-rule);
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--v3-ink-mute);
}

@media (max-width: 900px) {
  .v3-top { grid-template-columns: auto 1fr auto; padding: 16px 20px 0; }
  .v3-nav { display: none; }
  .v3-idx { display: none; }
  .v3-hero { padding: 32px 20px 56px; }
  .v3-hero-grid { grid-template-columns: 1fr; }
  .v3-stats { grid-template-columns: 1fr 1fr; }
  .v3-section { padding: 72px 20px; }
  .v3-about-grid { grid-template-columns: 1fr; gap: 32px; }
  .v3-svc-grid { grid-template-columns: 1fr; }
  .v3-pub-head, .v3-pub { grid-template-columns: 1fr; gap: 6px; }
  .v3-sample-grid { grid-template-columns: 1fr; }
  .v3-tl-item { grid-template-columns: 1fr; gap: 8px; }
  .v3-contact { padding: 72px 20px 40px; }
  .v3-contact-grid { grid-template-columns: 1fr 1fr; }
  .v3-footer { flex-direction: column; gap: 6px; }
}

</style>
</head>

<body>


<div class="tweaks" id="tweaks">
  <span class="tweaks-title">Tweaks</span>
  <span>Тема</span>
  <div class="tweaks-toggle" data-theme-toggle>
    <button data-theme="light" class="on">Светлая</button>
    <button data-theme="dark">Тёмная</button>
  </div>
</div>

<!-- TECH-SOMM                                                     -->
<!-- ============================================================ -->
<main class="variant active v3" data-screen-label="03 Tech-somm" id="v3"></main>

<!-- content loaders -->
<script>
/* Общие данные для всех вариантов */
window.SITE = {
  name: 'Светлана Орлова',

      { t: 'Email',     v: 'svetlana.n.orlova@gmail.com', href: 'mailto:svetlana.n.orlova@gmail.com' },
      { t: 'LinkedIn',  v: 'svetlana-orlova',   href: 'https://www.linkedin.com/in/svetlana-orlova-44b961a5/' },
      { t: 'Резюме',    v: 'PDF',       href: 'https://drive.google.com/file/u/2/d/1IZQTuZy0nsrmzR_Q1mteaIpdNqdi7Lcm/view?usp=drivesdk' },
    ],
  },
};

</script>
<script>
/* =================================================================
   APP — render all 3 variants + wire switcher + tweaks
   ================================================================= */
(function () {
  const S = window.SITE;

  /* -------------------- utilities -------------------- */
  const h = (tag, attrs = {}, ...children) => {
    const el = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') el.className = v;
      else if (k === 'html') el.innerHTML = v;
      else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2), v);
      else if (v === true) el.setAttribute(k, '');
      else if (v !== false && v != null) el.setAttribute(k, v);
    }
    for (const c of children.flat()) {
      if (c == null || c === false) continue;
      el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    }
    return el;
  };
  const frag = (...nodes) => {
    const f = document.createDocumentFragment();
    nodes.flat().forEach(n => { if (n != null && n !== false) f.appendChild(typeof n === 'string' ? document.createTextNode(n) : n); });
    return f;
  };
  const rv = (n, d = 0) => { n.classList.add('rv'); if (d) n.classList.add('d' + d); return n; };

  /* =================================================================
     VARIANT 1 — EDITORIAL (светлый, сериф Fraunces, кремовый)
     ================================================================= */
  /* =================================================================
     VARIANT 3 — TECH-SOMM (Space Grotesk, минимал, структурный)
     ================================================================= */
  function renderV3(root) {
    const m = S.manifestos.v3;

    // HERO
    const hero = h('section', { class: 'v3-hero' },
      h('header', { class: 'v3-top' },
        h('span', { class: 'v3-idx' }, '[ 001 ]'),
        h('span', { class: 'v3-brand' }, 'Svetlana Orlova'),
        h('nav', { class: 'v3-nav' },
          h('a', { href: '#about' }, 'about'),
          h('a', { href: '#services' }, 'services'),
          h('a', { href: '#publications' }, 'work'),
          h('a', { href: '#contact' }, 'contact'),
        ),
        h('span', { class: 'v3-status' },
          h('span', { class: 'v3-dot' }),
          'Открыта к проектам',
        ),
      ),
      h('div', { class: 'v3-hero-grid' },
        h('div', { class: 'v3-hero-l' },
          rv(h('div', { class: 'v3-kicker' }, m.kicker), 1),
          rv(h('h1', { class: 'v3-display' },
            ...m.title.split('\n').flatMap((line, i, arr) => [
              document.createTextNode(line),
              i < arr.length - 1 ? h('br') : null,
            ]),
          ), 2),
          rv(h('p', { class: 'v3-lede' }, m.lede), 3),
          rv(h('div', { class: 'v3-cta-row' },
            h('a', { class: 'v3-btn primary', href: 'https://t.me/orlsve', target: '_blank', rel: 'noopener' },
              h('span', {}, 'Обсудить проект'),
              h('span', { class: 'v3-btn-ar' }, '→'),
            ),
            h('a', { class: 'v3-btn ghost', href: '#services' }, 'Услуги'),
          ), 4),
        ),
        h('div', { class: 'v3-hero-r rv' },
          h('figure', { class: 'v3-portrait' },
            h('img', { src: S.photo, alt: 'Светлана Орлова' }),

          ),
        ),
      ),
      h('div', { class: 'v3-stats rv' },
        ...S.stats.map(s => h('div', { class: 'v3-stat' },
          h('span', { class: 'v3-stat-n' }, s.n),
          h('span', { class: 'v3-stat-l' }, s.l),
        )),
      ),
    );

    // ABOUT
    const about = h('section', { class: 'v3-section v3-about', id: 'about' },
      rv(h('div', { class: 'v3-sec-head' },
        h('span', { class: 'v3-sec-idx' }, S.about.kicker),
        h('h2', { class: 'v3-h2' }, S.about.headline),
      )),
      h('div', { class: 'v3-about-grid' },
        h('div', { class: 'v3-about-body' },
          ...S.about.body.map((p, i) => rv(h('p', {}, p), (i % 3) + 1)),
        ),
        rv(h('aside', { class: 'v3-creds' },
          h('div', { class: 'v3-creds-head' }, '// Credentials'),
          ...S.about.creds.map((c, i) => h('div', { class: 'v3-cred' },
            h('span', { class: 'v3-cred-n' }, String(i + 1).padStart(2, '0')),
            h('span', { class: 'v3-cred-t' }, c.t),
            h('span', { class: 'v3-cred-s' }, c.s),
          )),
        ), 2),
      ),
    );

    // SERVICES
    const services = h('section', { class: 'v3-section v3-services', id: 'services' },
      rv(h('div', { class: 'v3-sec-head' },
        h('span', { class: 'v3-sec-idx' }, S.services.kicker),
        h('h2', { class: 'v3-h2' }, S.services.headline),
      )),
      h('div', { class: 'v3-svc-grid' },
        ...S.services.items.map((it, i) => rv(h('article', { class: 'v3-svc' },
          h('div', { class: 'v3-svc-head' },
            h('span', { class: 'v3-svc-num' }, '/ ' + it.num),
            h('span', { class: 'v3-svc-tag' }, it.tag),
          ),
          h('h3', { class: 'v3-svc-title' }, it.title),
          h('p', { class: 'v3-svc-body' }, it.body),
          h('div', { class: 'v3-svc-formats' },
            ...it.formats.map(f => h('span', {}, f)),
          ),
        ), (i % 3) + 1)),
      ),
    );

    // PUBLICATIONS
    const pubs = h('section', { class: 'v3-section v3-pubs', id: 'publications' },
      rv(h('div', { class: 'v3-sec-head' },
        h('span', { class: 'v3-sec-idx' }, S.publications.kicker),
        h('h2', { class: 'v3-h2' }, S.publications.headline),
      )),
      h('ul', { class: 'v3-pub-list' },
        ...S.publications.items.map((p, i) => rv(h('li', {},
          h('a', { href: p.href, target: '_blank', rel: 'noopener', class: 'v3-pub' },
            h('span', { class: 'v3-pub-type' }, p.type),
            h('span', { class: 'v3-pub-title' }, p.title),
            h('span', { class: 'v3-pub-outlet' }, p.outlet),
            h('span', { class: 'v3-pub-ar' }, '↗'),
          ),
        ), (i % 3) + 1)),
      ),
    );

    // SAMPLES
    const samples = h('section', { class: 'v3-section v3-samples' },
      rv(h('div', { class: 'v3-sec-head' },
        h('span', { class: 'v3-sec-idx' }, S.samples.kicker),
        h('h2', { class: 'v3-h2' }, S.samples.headline),
      )),
      h('div', { class: 'v3-sample-grid' },
        ...S.samples.items.map((it, i) => rv(h('a', { class: 'v3-sample', href: it.href, target: '_blank', rel: 'noopener' },
          h('div', { class: 'v3-sample-top' },
            h('span', {}, it.type),
            h('span', {}, '→'),
          ),
          h('div', { class: 'v3-sample-title' }, it.title),
        ), (i % 4) + 1)),
      ),
    );

    // EXPERIENCE
    const exp = h('section', { class: 'v3-section v3-exp' },
      rv(h('div', { class: 'v3-sec-head' },
        h('span', { class: 'v3-sec-idx' }, S.experience.kicker),
        h('h2', { class: 'v3-h2' }, S.experience.headline),
      )),
      h('ol', { class: 'v3-tl' },
        ...S.experience.items.map((e, i) => rv(h('li', { class: 'v3-tl-item' },
          h('span', { class: 'v3-tl-years' }, e.years),
          h('div', { class: 'v3-tl-c' },
            h('h3', {}, e.company, h('span', { class: 'v3-tl-city' }, ' — ' + e.city)),
            h('div', { class: 'v3-tl-role' }, e.role),
            h('p', {}, e.body),
          ),
        ), (i % 3) + 1)),
      ),
    );

    // CONTACT
    const contact = h('section', { class: 'v3-section v3-contact', id: 'contact' },
      rv(h('span', { class: 'v3-sec-idx' }, S.contact.kicker)),
      rv(h('h2', { class: 'v3-h2 big' }, S.contact.headline), 1),
      rv(h('p', { class: 'v3-contact-body' }, S.contact.body), 2),
      h('div', { class: 'v3-contact-grid' },
        ...S.contact.links.map((l, i) => rv(h('a', { class: 'v3-clink' + (l.primary ? ' primary' : ''), href: l.href, target: '_blank', rel: 'noopener' },
          h('span', { class: 'v3-clink-label' }, '// ' + l.t),
          h('span', { class: 'v3-clink-value' }, l.v),
          h('span', { class: 'v3-clink-ar' }, '→'),
        ), (i % 4) + 1)),
      ),
      h('footer', { class: 'v3-footer' },
        h('span', {}, '© 2026 · Svetlana Orlova'),
        h('span', {}, 'Belgrade · RU / EN'),
        h('span', {}, 'v.03'),
      ),
    );

    root.appendChild(frag(hero, about, services, pubs, samples, exp, contact));
  }

  /* -------------------- init -------------------- */
  renderV3(document.getElementById('v3'));
  document.body.dataset.variant = 'v3';

  /* -------------------- reveal on scroll -------------------- */
  let io;
  function initReveal() {
    if (io) io.disconnect();
    io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -5% 0px' });
    const active = document.querySelector('.variant.active');
    if (!active) return;
    active.querySelectorAll('.rv:not(.in)').forEach(el => io.observe(el));
  }
  initReveal();
  /* -------------------- tweaks (theme toggle) -------------------- */
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "light"
  }/*EDITMODE-END*/;
  let theme = TWEAK_DEFAULTS.theme;

  function applyTheme(t) {
    theme = t;
    document.body.dataset.theme = t;
    document.querySelectorAll('[data-theme-toggle] button').forEach(b => {
      b.classList.toggle('on', b.dataset.theme === t);
    });
  }
  applyTheme(theme);

  document.querySelectorAll('[data-theme-toggle] button').forEach(b => {
    b.addEventListener('click', () => {
      applyTheme(b.dataset.theme);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme } }, '*');
    });
  });

  // Edit-mode (Tweaks) protocol
  window.addEventListener('message', (e) => {
    const d = e.data;
    if (!d || typeof d !== 'object') return;
    if (d.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('on');
    if (d.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('on');
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');
})();

</script>
</body>
</html>
